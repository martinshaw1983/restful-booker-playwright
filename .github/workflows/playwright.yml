name: Restful Booker API Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: npm run test
      env:
        BASE_URL: ${{ secrets.BASE_URL }}
        BOOKING_USER: ${{ secrets.BOOKING_USER }}
        BOOKING_PASSWORD: ${{ secrets.BOOKING_PASSWORD }}

    # This single step completely replaces all three old plugins
    - name: Generate and Deploy Allure Report
      uses: mgrybyk-org/allure-report-gh-pages-action@v2
      if: always()
      with:
        allure_results: allure-results
        allure_history: allure-history
        keep_reports: 20