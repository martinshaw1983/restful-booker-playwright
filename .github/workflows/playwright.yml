name: Restful Booker API Playwright Tests

on:
  push:
    branches: [ main]
  pull_request:
    branches: [ main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Dependencies Only
      run: npx playwright install-deps chromium

    - name: Run Playwright tests
      run: npm run test
      env:
        BASE_URL: ${{ secrets.BASE_URL }}
        BOOKING_USER: ${{ secrets.BOOKING_USER }}
        BOOKING_PASSWORD: ${{ secrets.BOOKING_PASSWORD }}
    
    - name: Checkout gh-pages
      uses: actions/checkout@v4
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages-dir

    - name: Allure Report Action
      uses: mgrybyk-org/allure-report-branch-action@v1
      if: always()
      continue-on-error: true
      id: allure
      with:
        report_id: 'self-test'
        gh_pages: 'gh-pages-dir'
        report_dir: 'allure-results'

    - name: Git Commit and Push Action
      uses: mgrybyk-org/git-commit-pull-push-action@v1
      if: always()
      with:
        repository: gh-pages-dir
        branch: gh-pages
        pull_args: --rebase -X ours
    
    - name: Send Email Notification
      uses: dawidd6/action-send-mail@v4
      if: always()
      with:
        server_address: ${{ secrets.SMTP_SERVER }}
        server_port: ${{ secrets.SMTP_PORT }}
        username: ${{ secrets.SMTP_USERNAME }}
        password: ${{ secrets.SMTP_PASSWORD }}
        subject: 'Playwright API Test Run: ${{ job.status }}'
        to: mr.mp.shaw.1983@gmail.com 
        from: Playwright Automation Bot <mr.mp.shaw.1983@gmail.com>
        secure: true
        content_type: text/html
        html_body: |
          <p>Playwright API test suite execution completed with status: <strong>${{ job.status }}</strong></p>
          
          <p>You can view the full interactive dashboard here: 
          <a href="${{ steps.allure.outputs.report_url }}">
            View Allure Test Report
          </a></p>
          
          <p>Triggered by event: <strong>${{ github.event_name }}</strong> by <strong>${{ github.actor }}</strong> on branch ${{ github.head_ref || github.ref_name }}.</p>
